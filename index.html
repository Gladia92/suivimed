<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuiviMed</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { max-width: 100%; overflow-x: hidden; }

      /* Design tokens */
      :root {
        --brand: #0891B2;
        --brand-strong: #0E7490;
        --brand-soft: #E3F4F8;
        --brand-grad: linear-gradient(135deg, #06B6D4 0%, #0891B2 55%, #0E7490 100%);

        --color-background-primary: #ffffff;
        --color-background-secondary: #f1f5f8;
        --color-background-app: #f6f8fb;
        --color-background-danger: #fff1f1;
        --color-background-info: #e6f6fb;
        --color-text-primary: #0f172a;
        --color-text-secondary: #5a6a7a;
        --color-text-tertiary: #9aa7b4;
        --color-text-info: var(--brand-strong);
        --color-text-success: #15803d;
        --color-text-danger: #dc2626;
        --color-text-warning: #b45309;
        --color-border-tertiary: #eaeef3;
        --color-border-secondary: #dbe2ea;
        --color-border-info: var(--brand);
        --color-border-danger: #f2b8b8;
        --color-border-warning: #ecd08a;
        --color-background-warning: #fff8ec;
        --border-radius-md: 10px;
        --border-radius-lg: 16px;
        --shadow-sm: 0 1px 2px rgba(15,23,42,0.06), 0 1px 3px rgba(15,23,42,0.05);
        --shadow-md: 0 6px 18px rgba(15,23,42,0.09);
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-background-app);
        color: var(--color-text-primary);
        min-height: 100vh;
        overflow-x: hidden; /* évite tout débordement horizontal accidentel (la grille semaine/mois a son propre scroll) */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { max-width: 1400px; margin: 0 auto; padding: 22px 18px 40px; }

      /* Buttons */
      button {
        font-family: inherit;
        font-size: 13px;
        padding: 7px 13px;
        border: 1px solid var(--color-border-secondary);
        border-radius: 10px;
        background: #fff;
        color: var(--color-text-primary);
        cursor: pointer;
        transition: background .15s ease, border-color .15s ease, box-shadow .15s ease, transform .05s ease;
      }
      button:hover { background: #f7fafc; border-color: var(--brand); box-shadow: var(--shadow-sm); }
      button:active { transform: translateY(0.5px); }
      button:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

      /* Inputs */
      input, textarea, select {
        font-family: inherit;
        font-size: 13px;
        border: 1px solid var(--color-border-secondary);
        border-radius: 10px;
        padding: 7px 11px;
        background: #fff;
        color: var(--color-text-primary);
        outline: none;
        transition: border-color .15s ease, box-shadow .15s ease;
      }
      input:focus, textarea:focus, select:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(8,145,178,0.16);
      }

      /* Number input arrows hidden */
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
      input[type=number] { -moz-appearance: textfield; }

      /* Accent checkbox / radio */
      input[type=checkbox], input[type=radio] { accent-color: var(--brand); width: 16px; height: 16px; cursor: pointer; }

      /* Spinner : fait tourner les icônes de chargement (Tabler ti-loader-2) */
      @keyframes sm-spin { to { transform: rotate(360deg); } }
      .ti-loader-2 { display: inline-block; animation: sm-spin 0.8s linear infinite; }

      /* Apparition douce des vues */
      @keyframes sm-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
      .sm-view { animation: sm-fade-in .22s ease both; }

      /* Scrollbar discrète (desktop) */
      * { scrollbar-width: thin; scrollbar-color: #cdd6df transparent; }
      *::-webkit-scrollbar { height: 8px; width: 8px; }
      *::-webkit-scrollbar-thumb { background: #cdd6df; border-radius: 8px; }
      *::-webkit-scrollbar-thumb:hover { background: #b6c1cc; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

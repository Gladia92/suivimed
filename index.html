<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuiviMed</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #ffffff;
        color: #1a1a1a;
        min-height: 100vh;
      }
      #root { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

      /* Buttons */
      button {
        font-family: inherit;
        font-size: 13px;
        padding: 6px 12px;
        border: 0.5px solid #d0d0d0;
        border-radius: 8px;
        background: transparent;
        color: #1a1a1a;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: #f4f4f4; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Inputs */
      input, textarea, select {
        font-family: inherit;
        font-size: 13px;
        border: 0.5px solid #d0d0d0;
        border-radius: 8px;
        padding: 6px 10px;
        background: #fafafa;
        color: #1a1a1a;
        outline: none;
      }
      input:focus, textarea:focus { border-color: #378ADD; }

      /* Number input arrows hidden */
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
      input[type=number] { -moz-appearance: textfield; }

      /* Spinner : fait tourner les icônes de chargement (Tabler ti-loader-2) */
      @keyframes sm-spin { to { transform: rotate(360deg); } }
      .ti-loader-2 { display: inline-block; animation: sm-spin 0.8s linear infinite; }

      /* Colors */
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f6f6f6;
        --color-background-danger: #fff0f0;
        --color-background-info: #e8f2fc;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #666;
        --color-text-tertiary: #aaa;
        --color-text-info: #185FA5;
        --color-text-success: #3B6D11;
        --color-text-danger: #A32D2D;
        --color-text-warning: #9a6a00;
        --color-border-tertiary: #e8e8e8;
        --color-border-secondary: #d0d0d0;
        --color-border-info: #378ADD;
        --color-border-danger: #f09595;
        --color-border-warning: #e6c06a;
        --color-background-warning: #fff7e6;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
